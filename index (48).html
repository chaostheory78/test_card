<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position: fixed; inset:0;
      width:100%; height:100%;
      object-fit: cover; z-index:0;
    }

    /* The 3D viewport — huge perspective = card feels far away */
    #scene {
      position: fixed; inset:0;
      z-index:1; pointer-events:none;
      perspective: 1200px;
      perspective-origin: 50% 50%;
    }

    /* This is the "world" — it rotates with the phone so the card inside stays still */
    #world {
      position: absolute;
      width:100%; height:100%;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* Card is fixed in the world at a point in space */
    #card-anchor {
      position: absolute;
      top:50%; left:50%;
      transform-style: preserve-3d;
      /* Start 4 metres back — translateZ(-400px) at 1200px perspective feels like ~4m */
      transform: translateX(-50%) translateY(-50%) translateZ(-400px);
    }

    #card-img {
      width: 280px;
      display: block;
      border-radius: 6px;
      box-shadow:
        0 0 60px rgba(255,20,147,0.8),
        0 0 120px rgba(255,20,147,0.3),
        0 30px 80px rgba(0,0,0,0.6);
      animation: float 3.5s ease-in-out infinite;
    }

    /* Hearts float in world space too */
    #hearts-layer {
      position: fixed; inset:0;
      z-index:2; pointer-events:none; overflow:hidden;
    }
    .heart {
      position: absolute; border-radius:50%;
      animation: rise linear infinite;
    }

    /* Ring also in world — orbits the card */
    #ring-anchor {
      position: absolute;
      top:50%; left:50%;
      transform-style: preserve-3d;
      transform: translateX(-50%) translateY(-50%) translateZ(-400px) rotateX(75deg);
      animation: spin-ring 8s linear infinite;
    }
    #ring-svg { width:380px; opacity:0.6; }

    #msg {
      position: fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:3; pointer-events:none;
      font-family: Georgia, serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow: 0 0 20px #ff1493, 0 0 6px #fff;
      animation: pulse 1.6s ease-in-out infinite; }
    #msg p  { color:#ffb6c1; font-size:4.5vw;
      text-shadow: 0 0 10px #ff1493; margin-top:4px; }

    #hud {
      position: fixed; top:12px; left:50%; transform:translateX(-50%);
      background: rgba(60,0,30,0.85); color:#ffb6c1;
      font-family: monospace; font-size:11px;
      padding:6px 16px; border-radius:20px;
      border:1px solid #441122; z-index:9999;
      text-align:center; white-space:nowrap;
    }

    #banner {
      position: fixed; bottom:20px; left:10px; right:10px;
      background: rgba(60,0,30,0.88); color:#ffb6c1;
      font-family: Georgia, serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px;
      border:1px solid #ff69b4; text-align:center;
      z-index:9999; display:none;
    }

    #splash {
      position: fixed; inset:0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition: opacity 1s ease;
      font-family: Georgia, serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation: hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.8; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes spin-ring{ to{transform:translateX(-50%) translateY(-50%) translateZ(-400px) rotateX(75deg) rotateZ(360deg)} }
    @keyframes hb       { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise     { 0%{transform:translateY(0) scale(1);opacity:0.85}
                         100%{transform:translateY(-110vh) scale(0.1);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <!-- 3D scene -->
  <div id="scene">
    <div id="world">

      <!-- Card pinned in space -->
      <div id="card-anchor">
        <img id="card-img" src="./card.png" alt="Mother's Day Card"/>
      </div>

      <!-- Orbiting ring around card -->
      <div id="ring-anchor">
        <svg id="ring-svg" viewBox="0 0 200 200" fill="none">
          <circle cx="100" cy="100" r="90" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="14 7"/>
          <circle cx="100" cy="100" r="70" stroke="#ff1493" stroke-width="1" stroke-dasharray="7 12"/>
        </svg>
      </div>

    </div>
  </div>

  <!-- 2D hearts on top -->
  <div id="hearts-layer"></div>

  <!-- Message -->
  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="hud">🧭 Calibrating…</div>
  <div id="banner">🌸 Happy Mother's Day! Turn to find the card 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access<br>The card is pinned in space —<br>turn around to find it!</p>
  </div>

  <script>
    const splash    = document.getElementById('splash');
    const banner    = document.getElementById('banner');
    const cam       = document.getElementById('cam');
    const world     = document.getElementById('world');
    const heartsEl  = document.getElementById('hearts-layer');
    const hud       = document.getElementById('hud');

    // ── Gyro state ──
    // We store the INITIAL orientation and apply the INVERSE delta to the world
    // This makes the card appear completely fixed in space
    let initAlpha = null;
    let initBeta  = null;
    let initGamma = null;

    let curRotX = 0, curRotY = 0, curRotZ = 0;
    let tgtRotX = 0, tgtRotY = 0, tgtRotZ = 0;

    function handleOrientation(e){
      if(e.alpha === null) return;

      const a = e.alpha;  // 0-360  yaw   (compass)
      const b = e.beta;   // -180 to 180  pitch
      const g = e.gamma;  // -90  to 90   roll

      // Capture initial orientation once
      if(initAlpha === null){
        initAlpha = a;
        initBeta  = b;
        initGamma = g;
        hud.textContent = '✅ Card locked — turn to explore!';
      }

      // Delta from initial — how much has the phone moved?
      let dAlpha = angleDiff(a, initAlpha);  // yaw  delta
      let dBeta  = b - initBeta;             // pitch delta
      let dGamma = g - initGamma;            // roll  delta

      // Apply INVERSE rotation to world so card stays static
      // When phone turns right (+gamma), world turns left (-Y)
      // When phone tilts up (-beta),    world tilts down (+X)
      tgtRotY = -dAlpha * 0.9;   // yaw:   turning left/right
      tgtRotX =  dBeta  * 0.9;   // pitch: tilting up/down
      tgtRotZ = -dGamma * 0.9;   // roll:  tilting left/right

      const dist = Math.sqrt(dAlpha*dAlpha + dBeta*dBeta);
      const dir  = Math.abs(dAlpha) < 15 ? '✅ Facing card!' : dAlpha > 0 ? `◀ ${Math.round(Math.abs(dAlpha))}°` : `▶ ${Math.round(Math.abs(dAlpha))}°`;
      hud.textContent = `🧭 ${Math.round(a)}° | ${dir}`;
    }

    function angleDiff(a, b){
      return ((a - b) + 540) % 360 - 180;
    }

    // Smooth animation loop
    function animate(){
      curRotX += (tgtRotX - curRotX) * 0.15;
      curRotY += (tgtRotY - curRotY) * 0.15;
      curRotZ += (tgtRotZ - curRotZ) * 0.15;

      world.style.transform =
        `rotateX(${curRotX}deg) rotateY(${curRotY}deg) rotateZ(${curRotZ}deg)`;

      requestAnimationFrame(animate);
    }
    animate();

    // ── Start gyro ──
    function startGyro(){
      if(typeof DeviceOrientationEvent !== 'undefined' &&
         typeof DeviceOrientationEvent.requestPermission === 'function'){
        DeviceOrientationEvent.requestPermission().then(s => {
          if(s === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
        }).catch(console.error);
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const sz = 5 + Math.random() * 12;
      h.style.cssText = `
        left:${8+Math.random()*84}%;
        bottom:${10+Math.random()*40}%;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*2}s;
        box-shadow: 0 0 6px currentColor;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 320);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startGyro();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
