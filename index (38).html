<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { overflow:hidden; }
    #banner {
      position: fixed; bottom: 20px; left: 10px; right: 10px;
      background: rgba(60,0,30,0.9); color: #ffb6c1;
      font-family: Georgia, serif; font-size: 1em;
      padding: 12px 20px; border-radius: 20px;
      border: 1px solid #ff69b4; text-align: center;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="banner">📡 Getting location…</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Everything placed at test coords, 1m off ground -->
    <a-sphere gps-entity-place="latitude: 50.7895223; longitude: -1.0840788;"
      color="#ff0055" radius="2" position="0 1 0"></a-sphere>

    <a-sphere gps-entity-place="latitude: 50.7895223; longitude: -1.0840788;"
      color="#ff69b4" radius="1.5" position="0 4 0"
      animation="property: position; from: 0 4 0; to: 0 6 0; dur: 2000; loop: true; dir: alternate;">
    </a-sphere>

    <a-text
      gps-entity-place="latitude: 50.7895223; longitude: -1.0840788;"
      value="I Love You Mum"
      align="center" color="#ffffff" width="40"
      position="0 1 0">
    </a-text>

  </a-scene>

  <script>
    const banner   = document.getElementById('banner');
    const VIEW_LAT = 50.7895313;
    const VIEW_LNG = -1.0840788;
    const LAT      = 50.7895223;
    const LNG      = -1.0840788;

    function toRad(v){ return v * Math.PI / 180; }
    function dist(la1,lo1,la2,lo2){
      const R=6371000, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
      const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    navigator.geolocation.watchPosition(pos => {
      const d = Math.round(dist(pos.coords.latitude, pos.coords.longitude, VIEW_LAT, VIEW_LNG));
      banner.innerHTML = d < 10
        ? '🌸 Look south — surprise is here!'
        : `📍 ${d}m away — walk closer`;
    }, err => {
      banner.textContent = '❌ Enable GPS and reload';
    }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 });
  </script>

</body>
</html>
