<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position: fixed; inset:0;
      width:100%; height:100%;
      object-fit: cover; z-index:0;
    }

    /* Card layer — CSS 3D transforms applied here */
    #ar-layer {
      position: fixed; inset:0;
      z-index:1; pointer-events:none;
      perspective: 800px;
      display: flex; align-items: center; justify-content: center;
    }

    #card-wrap {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.08s ease-out;
      will-change: transform;
    }

    #card-img {
      width: 78vw;
      max-width: 420px;
      display: block;
      border-radius: 6px;
      box-shadow:
        0 0 40px rgba(255,20,147,0.6),
        0 0 80px rgba(255,20,147,0.3);
      animation: float 3s ease-in-out infinite;
    }

    /* Floating hearts layer — separate so they move more than card */
    #hearts-layer {
      position: fixed; inset:0;
      z-index:2; pointer-events:none;
      overflow:hidden;
    }

    .heart {
      position: absolute;
      border-radius: 50%;
      animation: rise linear infinite;
      opacity: 0.85;
      box-shadow: 0 0 8px currentColor;
    }

    /* Text overlay */
    #msg {
      position: fixed;
      bottom: 90px; left:0; right:0;
      text-align: center;
      z-index:3; pointer-events:none;
      font-family: Georgia, serif;
    }
    #msg h2 {
      color: #fff;
      font-size: 7vw;
      font-weight: bold;
      text-shadow: 0 0 16px #ff1493, 0 0 4px #fff;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #msg p {
      color: #ffb6c1;
      font-size: 4.5vw;
      text-shadow: 0 0 10px #ff1493;
      margin-top: 4px;
    }

    /* Spinning ring */
    #ring {
      position: fixed; inset:0;
      z-index:2; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
    }
    #ring svg { width:85vw; max-width:460px; animation: spin 10s linear infinite; opacity:0.5; }

    #banner {
      position: fixed; bottom:20px; left:10px; right:10px;
      background: rgba(60,0,30,0.88); color:#ffb6c1;
      font-family: Georgia, serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px;
      border:1px solid #ff69b4; text-align:center;
      z-index:9999; display:none;
    }

    #splash {
      position: fixed; inset:0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index:9999; text-align:center;
      padding:30px; gap:18px; transition: opacity 1s ease;
      font-family: Georgia, serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon { font-size:4em; animation: hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub { color:#ffb6c1; font-size:0.9em; line-height:1.7; }
    .s-ring { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes float  { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-12px)} }
    @keyframes spin   { to{transform:rotate(360deg)} }
    @keyframes hb     { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise   { 0%{transform:translateY(0) scale(1);opacity:0.9} 100%{transform:translateY(-100vh) scale(0.3);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <!-- 3D card -->
  <div id="ar-layer">
    <div id="card-wrap">
      <img id="card-img" src="./card.png" alt="Mother's Day Card"/>
    </div>
  </div>

  <!-- Spinning ring SVG -->
  <div id="ring">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="12 6"/>
      <circle cx="100" cy="100" r="75" stroke="#ff1493" stroke-width="1" stroke-dasharray="6 10"/>
    </svg>
  </div>

  <!-- Floating hearts -->
  <div id="hearts-layer"></div>

  <!-- Message -->
  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="banner">🌸 Happy Mother's Day! 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera access when asked</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const heartsEl = document.getElementById('hearts-layer');

    // ── Gyroscope 3D tilt ──
    let tiltX = 0, tiltY = 0;
    let targetX = 0, targetY = 0;

    function handleOrientation(e){
      // beta  = front/back tilt (-180 to 180)
      // gamma = left/right tilt (-90 to 90)
      const beta  = e.beta  || 0;
      const gamma = e.gamma || 0;
      // Map to gentle rotation range
      targetY = Math.max(-18, Math.min(18,  gamma * 0.35));
      targetX = Math.max(-12, Math.min(12, (beta - 45) * 0.2));
    }

    window.addEventListener('deviceorientation', handleOrientation);

    // Smooth lerp on card tilt
    function animateTilt(){
      tiltX += (targetX - tiltX) * 0.1;
      tiltY += (targetY - tiltY) * 0.1;
      cardWrap.style.transform =
        `rotateX(${-tiltX}deg) rotateY(${tiltY}deg) translateZ(30px)`;
      requestAnimationFrame(animateTilt);
    }
    animateTilt();

    // ── Spawn floating hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const size = 6 + Math.random() * 14;
      h.style.cssText = `
        left: ${10 + Math.random() * 80}%;
        bottom: ${20 + Math.random() * 30}%;
        width: ${size}px; height: ${size}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${3 + Math.random() * 4}s;
        animation-delay: ${Math.random() * 2}s;
        color: ${colors[Math.floor(Math.random()*colors.length)]};
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 7000);
    }
    setInterval(spawnHeart, 350);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon in the address bar, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
