<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
    #card-wrap { position:fixed; z-index:2; pointer-events:none; will-change:transform; }
    #card-img {
      width:260px; display:block; border-radius:6px;
      box-shadow:0 0 50px rgba(255,20,147,0.9),0 20px 60px rgba(0,0,0,0.5);
      animation:float 3.5s ease-in-out infinite;
    }
    #ring-wrap { position:fixed; z-index:1; pointer-events:none; }
    #hearts-layer { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
    .heart { position:absolute; border-radius:50%; animation:rise linear infinite; }
    #msg {
      position:fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:4; pointer-events:none; font-family:Georgia,serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow:0 0 20px #ff1493,0 0 6px #fff; animation:pulse 1.6s ease-in-out infinite; }
    #msg p { color:#ffb6c1; font-size:4.5vw; text-shadow:0 0 10px #ff1493; margin-top:4px; }
    #hud {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.85); color:#0f0; font-family:monospace; font-size:11px;
      padding:6px 14px; border-radius:20px; border:1px solid #0f0;
      z-index:9999; white-space:nowrap; max-width:95vw; text-align:center;
    }
    #banner {
      position:fixed; bottom:20px; left:10px; right:10px;
      background:rgba(60,0,30,0.88); color:#ffb6c1;
      font-family:Georgia,serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px; border:1px solid #ff69b4;
      text-align:center; z-index:9999; display:none;
    }
    #splash {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#0a0015 0%,#000005 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition:opacity 1s ease; font-family:Georgia,serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation:hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.8; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.85}
                      100%{transform:translateY(-110vh) scale(0.1);opacity:0} }
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <div id="card-wrap"><img id="card-img" src="./card.png"/></div>
  <div id="ring-wrap" style="display:none;">
    <svg viewBox="0 0 200 200" fill="none" style="width:340px;animation:spin 9s linear infinite;opacity:0.55;">
      <circle cx="100" cy="100" r="90" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="14 7"/>
      <circle cx="100" cy="100" r="70" stroke="#ff1493" stroke-width="1" stroke-dasharray="7 12"/>
    </svg>
  </div>
  <div id="hearts-layer"></div>
  <div id="msg"><h2>I Love You Mum</h2><p>Happy Mother's Day 🌸</p></div>
  <div id="hud">⭐ Starting…</div>
  <div id="banner">🌸 Happy Mother's Day! Tilt your phone to explore 💐</div>
  <div id="splash">
    <div class="s-icon">🌸</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access.<br>Tilt your phone to find the card!</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const ringWrap = document.getElementById('ring-wrap');
    const heartsEl = document.getElementById('hearts-layer');
    const hud      = document.getElementById('hud');

    // ═══════════════════════════════════════
    //  ACCELEROMETER ONLY — stable tilt tracking
    //  ax,ay,az from gravity tell us exactly
    //  which way the phone is pointing
    //  No gyro, no drift, totally stable
    // ═══════════════════════════════════════

    // Smoothed accelerometer values
    let sax = 0, say = 0, saz = -9.8;

    // Locked reference direction (unit vector)
    let refX = 0, refY = 0, refZ = 0;
    let locked = false;
    let readings = 0;

    // Smoothed screen position
    let sX = window.innerWidth/2, sY = window.innerHeight/2;
    let sS = 1, sOp = 1;

    const FOCAL   = () => window.innerWidth * 1.4;
    const SMOOTH  = 0.05; // accelerometer smoothing
    const LERP    = 0.06; // screen position lerp

    function startSensors(){
      try {
        const acc = new Accelerometer({ frequency: 60 });

        acc.addEventListener('reading', () => {
          // Smooth the raw values heavily — eliminates jitter
          sax += (acc.x - sax) * SMOOTH;
          say += (acc.y - say) * SMOOTH;
          saz += (acc.z - saz) * SMOOTH;

          readings++;

          // Normalise to unit vector — this is our "look direction"
          const n = Math.sqrt(sax*sax + say*say + saz*saz);
          if(n < 0.1) return;
          const nx = sax/n, ny = say/n, nz = saz/n;

          // Lock reference on first stable reading
          if(!locked && readings > 120){
            refX = nx; refY = ny; refZ = nz;
            locked = true;
            hud.textContent = '⭐ Locked! Tilt phone to explore';
            return;
          }
          if(!locked){
            hud.textContent = `⭐ Calibrating… ${readings}/120`;
            return;
          }

          // How far has the phone moved from the locked direction?
          // Using dot product and cross product to get angle + direction
          const dot = nx*refX + ny*refY + nz*refZ;
          const clampedDot = Math.max(-1, Math.min(1, dot));

          // Direct delta from real device data:
          // X = left/right in portrait, Z = forward/back in portrait
          const dX = nx - refX;
          const dZ = nz - refZ;

          const W = window.innerWidth, H = window.innerHeight, F = FOCAL();

          // Tilt left/right → card moves left/right
          // Tilt forward/back → card moves up/down
          const tgtX = W/2 - dX * F * 2.5;
          const tgtY = H/2 - dZ * F * 2.5;

          // Scale by how directly we're facing the card
          const tgtS  = Math.min(1.5, Math.max(0.1, clampedDot * 1.4));
          const tgtOp = Math.min(1,   Math.max(0,   clampedDot * 1.8));

          // Lerp to smooth position
          sX  += (tgtX - sX)  * LERP;
          sY  += (tgtY - sY)  * LERP;
          sS  += (tgtS - sS)  * LERP;
          sOp += (tgtOp- sOp) * LERP;

          // Apply to card
          const hw = 130, hh = 73 - window.innerHeight * 0.1;
          cardWrap.style.left            = (sX - hw*sS) + 'px';
          cardWrap.style.top             = (sY - hh*sS) + 'px';
          cardWrap.style.transform       = `scale(${sS})`;
          cardWrap.style.opacity         = sOp;
          cardWrap.style.transformOrigin = '0 0';

          const rw = 170;
          ringWrap.style.left            = (sX - rw*sS) + 'px';
          ringWrap.style.top             = (sY - rw*sS) + 'px';
          ringWrap.style.transform       = `scale(${sS})`;
          ringWrap.style.opacity         = sOp * 0.55;
          ringWrap.style.transformOrigin = '0 0';

          const offDeg = Math.round(Math.acos(clampedDot) * 180/Math.PI);
          hud.textContent = offDeg < 8 ? `⭐ Dead ahead!` : `🔭 ${offDeg}° off — tilt to find`;
        });

        acc.addEventListener('error', e => {
          hud.textContent = '❌ ' + e.error.message;
        });

        acc.start();
        hud.textContent = '📡 Accelerometer started…';

      } catch(e){
        hud.textContent = '❌ ' + e.message;
      }
    }

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h = document.createElement('div'); h.className = 'heart';
      const sz = 5 + Math.random() * 12;
      h.style.cssText = `
        left:${8+Math.random()*84}%; bottom:${10+Math.random()*40}%;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*2}s;
        box-shadow:0 0 6px currentColor;`;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 320);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' } }, audio:false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startSensors();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>
</body>
</html>
