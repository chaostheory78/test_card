<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Test</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family: monospace; }
    #debug {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-size: 12px; padding: 10px; z-index: 9999;
      line-height: 1.8;
    }
    #banner {
      position: fixed; bottom: 20px; left: 10px; right: 10px;
      background: rgba(60,0,30,0.9); color: #ffb6c1;
      font-family: Georgia, serif; font-size: 1em;
      padding: 12px 20px; border-radius: 20px;
      border: 1px solid #ff69b4; text-align: center;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="debug">
    📡 GPS: waiting...<br>
    📍 My pos: —<br>
    🎯 Target: 50.7894, -1.0841<br>
    📏 Distance: —<br>
    🎥 Camera: waiting...
  </div>

  <div id="banner">Loading…</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-camera gps-camera rotation-reader></a-camera>

    <a-sphere
      gps-entity-place="latitude: 50.78942812717267; longitude: -1.0841221818162863;"
      color="red"
      radius="5"
      position="0 3 0">
    </a-sphere>

  </a-scene>

  <script>
    const debug  = document.getElementById('debug');
    const banner = document.getElementById('banner');

    const LAT = 50.78942812717267;
    const LNG = -1.0841221818162863;

    function toRad(v){ return v * Math.PI / 180; }
    function dist(la1,lo1,la2,lo2){
      const R=6371000, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
      const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    // Check scene loaded
    document.querySelector('a-scene').addEventListener('loaded', () => {
      document.querySelector('#debug').innerHTML =
        document.querySelector('#debug').innerHTML.replace('🎥 Camera: waiting...','🎥 A-Frame: ✅ loaded');
    });

    // GPS watch
    if(!navigator.geolocation){
      debug.innerHTML += '<br>❌ No geolocation support!';
    } else {
      navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, accuracy } = pos.coords;
        const d = Math.round(dist(latitude, longitude, LAT, LNG));
        debug.innerHTML =
          `📡 GPS: ✅ accuracy ±${Math.round(accuracy)}m<br>` +
          `📍 Me: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>` +
          `🎯 Target: ${LAT.toFixed(6)}, ${LNG.toFixed(6)}<br>` +
          `📏 Distance: ${d}m<br>` +
          `🎥 A-Frame: ✅ loaded`;
        banner.textContent = d < 50 ? '🌸 Look around!' : `📍 ${d}m away`;
      }, err => {
        debug.innerHTML += `<br>❌ GPS error: ${err.message} (code ${err.code})`;
        banner.textContent = '❌ GPS failed — check permissions';
      }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
    }
  </script>

</body>
</html>
