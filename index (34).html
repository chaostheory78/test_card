<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { overflow: hidden; }
    #ui {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 30px;
      pointer-events: none; z-index: 999;
    }
    #banner {
      background: rgba(60,0,30,0.88);
      color: #ffb6c1; font-family: Georgia, serif;
      font-size: 1em; padding: 12px 26px;
      border-radius: 30px; border: 1px solid #ff69b4;
      text-align: center; max-width: 88vw;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div id="banner">📡 Getting GPS…</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="antialias: true; alpha: true"
    embedded>

    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Big red ball — easy to spot -->
    <a-sphere
      gps-entity-place="latitude: 50.78942812717267; longitude: -1.0841221818162863;"
      color="#ff0055"
      radius="3"
      position="0 3 0">
    </a-sphere>

    <!-- Big pink ball slightly offset so you can see both -->
    <a-sphere
      gps-entity-place="latitude: 50.78942812717267; longitude: -1.0841221818162863;"
      color="#ff69b4"
      radius="1.5"
      position="0 8 0"
      animation="property: position; from: 0 8 0; to: 0 12 0; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <!-- Big gold ball -->
    <a-sphere
      gps-entity-place="latitude: 50.78942812717267; longitude: -1.0841221818162863;"
      color="#FFD700"
      radius="1"
      position="0 14 0"
      animation="property: scale; from: 1 1 1; to: 2 2 2; dur: 1000; loop: true; dir: alternate;">
    </a-sphere>

    <!-- Text -->
    <a-text
      gps-entity-place="latitude: 50.78942812717267; longitude: -1.0841221818162863;"
      value="I Love You Mum"
      align="center"
      color="#ffffff"
      width="60"
      position="0 6 0">
    </a-text>

  </a-scene>

  <script>
    const banner = document.getElementById('banner');
    const LAT = 50.78942812717267;
    const LNG = -1.0841221818162863;

    function toRad(v){ return v * Math.PI / 180; }
    function dist(la1,lo1,la2,lo2){
      const R=6371000, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
      const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    navigator.geolocation.watchPosition(pos => {
      const d = Math.round(dist(pos.coords.latitude, pos.coords.longitude, LAT, LNG));
      if(d < 50){
        banner.innerHTML = '🌸 Look around — surprise is here!';
      } else {
        banner.innerHTML = `📍 ${d}m away — walk closer`;
      }
    }, err => {
      banner.innerHTML = '❌ Enable GPS and try again';
    }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 });
  </script>

</body>
</html>
