<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position: fixed; inset:0;
      width:100%; height:100%;
      object-fit: cover; z-index:0;
    }

    #ar-layer {
      position: fixed; inset:0;
      z-index:1;
      perspective: 600px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }

    #card-wrap {
      transform-style: preserve-3d;
      will-change: transform;
      position: relative;
    }

    #card-img {
      width: 78vw;
      max-width: 420px;
      display: block;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(255,20,147,0.7), 0 20px 60px rgba(0,0,0,0.5);
    }

    #hearts-layer {
      position: fixed; inset:0;
      z-index:2; pointer-events:none; overflow:hidden;
    }
    .heart {
      position: absolute; border-radius: 50%;
      animation: rise linear infinite; opacity: 0.85;
    }

    #ring {
      position: fixed; inset:0; z-index:2; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
      will-change: transform;
    }
    #ring svg { width:85vw; max-width:460px; animation:spin 10s linear infinite; opacity:0.55; }

    #msg {
      position: fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:3; pointer-events:none;
      font-family: Georgia, serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow: 0 0 16px #ff1493, 0 0 4px #fff;
      animation: pulse 1.6s ease-in-out infinite; }
    #msg p  { color:#ffb6c1; font-size:4.5vw;
      text-shadow: 0 0 10px #ff1493; margin-top:4px; }

    #compass-ui {
      position: fixed; top:12px; left:50%; transform:translateX(-50%);
      background: rgba(60,0,30,0.85); color:#ffb6c1;
      font-family: monospace; font-size:11px;
      padding:6px 16px; border-radius:20px;
      border:1px solid #441122; z-index:9999;
      text-align:center; white-space:nowrap;
    }

    #banner {
      position: fixed; bottom:20px; left:10px; right:10px;
      background: rgba(60,0,30,0.88); color:#ffb6c1;
      font-family: Georgia, serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px;
      border:1px solid #ff69b4; text-align:center;
      z-index:9999; display:none;
    }

    #splash {
      position: fixed; inset:0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition: opacity 1s ease;
      font-family: Georgia, serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation: hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.7; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.9}
                      100%{transform:translateY(-110vh) scale(0.2);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <div id="ar-layer">
    <div id="card-wrap">
      <img id="card-img" src="./card.png" alt="Mother's Day Card"/>
    </div>
  </div>

  <div id="ring">
    <svg viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="95" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="12 6"/>
      <circle cx="100" cy="100" r="75" stroke="#ff1493" stroke-width="1" stroke-dasharray="6 10"/>
    </svg>
  </div>

  <div id="hearts-layer"></div>

  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="compass-ui">🧭 Calibrating…</div>
  <div id="banner">🌸 Move your phone to see the magic! 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access<br>then move your phone around!</p>
  </div>

  <script>
    const splash     = document.getElementById('splash');
    const banner     = document.getElementById('banner');
    const cam        = document.getElementById('cam');
    const cardWrap   = document.getElementById('card-wrap');
    const heartsEl   = document.getElementById('hearts-layer');
    const compassUI  = document.getElementById('compass-ui');
    const cardImg    = document.getElementById('card-img');
    const arLayer    = document.getElementById('ar-layer');

    // ── Full 360 gyro state ──
    let alpha = 0;  // compass heading 0-360 (rotation around vertical axis)
    let beta  = 0;  // front/back tilt -180 to 180
    let gamma = 0;  // left/right tilt -90 to 90

    let lockedAlpha = null; // The compass direction the card is "pinned" to
    let calibrated  = false;

    // Smoothed display values
    let curRotX = 0, curRotY = 0;
    let curTx = 0, curTy = 0;
    let curScale = 1;

    function toRad(d){ return d * Math.PI / 180; }
    function toDeg(r){ return r * 180 / Math.PI; }

    // Shortest angle difference (-180 to 180)
    function angleDiff(a, b){
      let d = ((a - b) + 540) % 360 - 180;
      return d;
    }

    function handleOrientation(e){
      if(e.alpha === null || e.beta === null || e.gamma === null) return;

      alpha = e.alpha; // 0-360, compass (0 = north on some devices)
      beta  = e.beta;  // -180 to 180
      gamma = e.gamma; // -90 to 90

      // Lock the card direction on first reading
      if(!calibrated){
        lockedAlpha = alpha;
        calibrated  = true;
        compassUI.textContent = `🧭 Card locked at ${Math.round(lockedAlpha)}°`;
      }

      // ── How far are we from facing the card? ──
      const yawDiff   = angleDiff(alpha, lockedAlpha); // left/right from card direction
      const pitchDiff = beta - 90;                     // up/down from level (0 = straight ahead)

      // ── Scale: closer to facing = bigger, further = smaller ──
      const yawAbs   = Math.abs(yawDiff);
      const pitchAbs = Math.abs(pitchDiff);
      const totalOff = Math.sqrt(yawAbs*yawAbs + pitchAbs*pitchAbs);
      const targetScale = Math.max(0.1, Math.min(1.4, 1.4 - totalOff * 0.012));

      // ── Position: offset card based on where phone is pointing ──
      const targetTx = -yawDiff   * 6;   // shift left/right as you turn
      const targetTy =  pitchDiff * 5;   // shift up/down as you tilt

      // ── 3D rotation: tilt the card as you move around it ──
      const targetRotY =  Math.max(-45, Math.min(45, yawDiff   * 0.8));
      const targetRotX = -Math.max(-30, Math.min(30, pitchDiff * 0.6));

      // Lerp everything smoothly
      curRotX  += (targetRotX  - curRotX)  * 0.18;
      curRotY  += (targetRotY  - curRotY)  * 0.18;
      curTx    += (targetTx    - curTx)    * 0.15;
      curTy    += (targetTy    - curTy)    * 0.15;
      curScale += (targetScale - curScale) * 0.15;

      cardWrap.style.transform =
        `translate(${curTx}px, ${curTy}px) ` +
        `rotateX(${curRotX}deg) rotateY(${curRotY}deg) ` +
        `scale(${curScale})`;

      // Update compass debug
      const dir = yawAbs < 20 ? '✅ Looking at card!' : yawDiff > 0 ? `◀ Turn left ${Math.round(yawAbs)}°` : `▶ Turn right ${Math.round(yawAbs)}°`;
      compassUI.textContent = `🧭 ${Math.round(alpha)}° | ${dir}`;
    }

    // ── Request permission (iOS) or attach directly (Android) ──
    function startGyro(){
      if(typeof DeviceOrientationEvent !== 'undefined' &&
         typeof DeviceOrientationEvent.requestPermission === 'function'){
        DeviceOrientationEvent.requestPermission().then(s => {
          if(s === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
        }).catch(console.error);
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    // ── Touch fallback if gyro not available ──
    let gyroWorking = false;
    let tx0 = 0, ty0 = 0;

    setTimeout(() => {
      if(!calibrated){
        compassUI.textContent = '👆 Drag to move card';
        document.addEventListener('touchstart', e => { tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; });
        document.addEventListener('touchmove', e => {
          const dx = (e.touches[0].clientX - tx0) / window.innerWidth  * 120 - 60;
          const dy = (e.touches[0].clientY - ty0) / window.innerHeight * 80  - 40;
          cardWrap.style.transform = `translate(${dx*3}px,${dy*3}px) rotateX(${-dy*0.5}deg) rotateY(${dx*0.5}deg)`;
        });
      }
    }, 3000);

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd','#ff8fb1'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const size = 5 + Math.random() * 13;
      h.style.cssText = `
        left:${8+Math.random()*84}%;
        bottom:${15+Math.random()*35}%;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*1.5}s;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 300);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startGyro();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
