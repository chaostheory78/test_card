<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover; z-index:0;
    }

    /* Card is positioned by JS based on spherical projection */
    #card-wrap {
      position: fixed;
      z-index: 2;
      transform-origin: center center;
      will-change: transform, left, top, opacity;
      pointer-events: none;
    }

    #card-img {
      width: 260px;
      display: block;
      border-radius: 6px;
      box-shadow:
        0 0 50px rgba(255,20,147,0.8),
        0 0 100px rgba(255,20,147,0.3),
        0 20px 60px rgba(0,0,0,0.6);
      animation: float 3.5s ease-in-out infinite;
    }

    /* Ring orbits the card in 3D — positioned by JS too */
    #ring-wrap {
      position: fixed;
      z-index: 1;
      transform-origin: center center;
      pointer-events: none;
      will-change: transform, left, top;
    }
    #ring-svg { animation: spin 9s linear infinite; opacity: 0.55; }

    #hearts-layer {
      position:fixed; inset:0;
      z-index:3; pointer-events:none; overflow:hidden;
    }
    .heart {
      position:absolute; border-radius:50%;
      animation:rise linear infinite;
    }

    #msg {
      position:fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:4; pointer-events:none;
      font-family: Georgia, serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow: 0 0 20px #ff1493, 0 0 6px #fff;
      animation: pulse 1.6s ease-in-out infinite; }
    #msg p  { color:#ffb6c1; font-size:4.5vw;
      text-shadow: 0 0 10px #ff1493; margin-top:4px; }

    #hud {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(60,0,30,0.85); color:#ffb6c1;
      font-family:monospace; font-size:11px;
      padding:6px 16px; border-radius:20px;
      border:1px solid #441122; z-index:9999;
      white-space:nowrap;
    }

    #banner {
      position:fixed; bottom:20px; left:10px; right:10px;
      background:rgba(60,0,30,0.88); color:#ffb6c1;
      font-family:Georgia,serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px;
      border:1px solid #ff69b4; text-align:center;
      z-index:9999; display:none;
    }

    #splash {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#2d0030 0%,#0d000a 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition:opacity 1s ease;
      font-family:Georgia,serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation:hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.8; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.85}
                      100%{transform:translateY(-110vh) scale(0.1);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <div id="card-wrap">
    <img id="card-img" src="./card.png" alt="Mother's Day Card"/>
  </div>

  <div id="ring-wrap">
    <svg id="ring-svg" viewBox="0 0 200 200" fill="none" style="width:340px;">
      <circle cx="100" cy="100" r="90" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="14 7"/>
      <circle cx="100" cy="100" r="70" stroke="#ff1493" stroke-width="1" stroke-dasharray="7 12"/>
    </svg>
  </div>

  <div id="hearts-layer"></div>

  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="hud">🧭 Calibrating…</div>
  <div id="banner">🌸 Move your phone — find the card in space! 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access.<br>The card is pinned in space —<br>move your phone to find it!</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const ringWrap = document.getElementById('ring-wrap');
    const heartsEl = document.getElementById('hearts-layer');
    const hud      = document.getElementById('hud');

    // ── Maths helpers ──
    const toRad = d => d * Math.PI / 180;

    // Build rotation matrix from DeviceOrientation Euler angles
    // Following W3C spec: R = Rz(alpha) * Rx(beta) * Ry(gamma)
    function buildMatrix(alpha, beta, gamma){
      const a = toRad(alpha), b = toRad(beta), g = toRad(gamma);
      const ca=Math.cos(a), sa=Math.sin(a);
      const cb=Math.cos(b), sb=Math.sin(b);
      const cg=Math.cos(g), sg=Math.sin(g);
      // Row-major 3x3
      return [
        ca*cg - sa*sb*sg,  -cb*sa,  ca*sg + cg*sa*sb,
        cg*sa + ca*sb*sg,   ca*cb,  sa*sg - ca*cg*sb,
       -cb*sg,              sb,     cb*cg
      ];
    }

    // Multiply 3x3 matrix (row-major) by 3-vector
    function mulMV(m, v){
      return [
        m[0]*v[0] + m[1]*v[1] + m[2]*v[2],
        m[3]*v[0] + m[4]*v[1] + m[5]*v[2],
        m[6]*v[0] + m[7]*v[1] + m[8]*v[2]
      ];
    }

    // Transpose 3x3
    function transpose(m){
      return [
        m[0],m[3],m[6],
        m[1],m[4],m[7],
        m[2],m[5],m[8]
      ];
    }

    // ── State ──
    let cardWorld = null;  // Fixed world-space direction of card
    let curX = window.innerWidth  / 2;
    let curY = window.innerHeight / 2;
    let curS = 1;
    let tgtX = curX, tgtY = curY, tgtS = curS;
    let curOp = 1, tgtOp = 1;

    // Focal length — controls how fast card moves as you look away
    const FOCAL = 900;

    function handleOrientation(e){
      if(e.alpha === null || e.beta === null || e.gamma === null) return;

      const M = buildMatrix(e.alpha, e.beta, e.gamma);

      // On first reading: card is straight ahead — store its world direction
      if(!cardWorld){
        // Straight ahead in device space is (0, 0, -1)
        // Transform to world space: cardWorld = M * (0,0,-1) = -third column of M
        cardWorld = mulMV(M, [0, 0, -1]);
        hud.textContent = '✅ Card locked — explore around it!';
        return;
      }

      // Transform card world position into current device (camera) space
      // devicePos = M^T * cardWorld  (M^T = M^-1 for rotation matrices)
      const MT = transpose(M);
      const p  = mulMV(MT, cardWorld);

      // p is the card direction in camera space
      // p[2] < 0 means it's in front of us, > 0 means behind
      const W = window.innerWidth;
      const H = window.innerHeight;

      if(p[2] < -0.01){
        // Project onto screen: divide by -p[2] (depth)
        const depth = -p[2];
        const sx    = W/2 + (p[0] / depth) * FOCAL;
        const sy    = H/2 - (p[1] / depth) * FOCAL;
        // Scale: closer to centre = bigger
        const scale = Math.min(2.2, Math.max(0.15, depth * 1.0));

        tgtX  = sx;
        tgtY  = sy;
        tgtS  = scale;
        tgtOp = Math.min(1, depth * 2.5);

        const offDeg = Math.round(Math.acos(Math.max(-1,Math.min(1,depth))) * 180/Math.PI);
        hud.textContent = offDeg < 15
          ? `✅ Dead ahead!`
          : `🧭 ${offDeg}° away — keep moving`;
      } else {
        // Card is behind us
        tgtOp = 0;
        hud.textContent = `🔄 Card is behind you — turn around`;
      }
    }

    // Smooth animation loop
    function animate(){
      curX  += (tgtX  - curX)  * 0.14;
      curY  += (tgtY  - curY)  * 0.14;
      curS  += (tgtS  - curS)  * 0.14;
      curOp += (tgtOp - curOp) * 0.14;

      const hw = 130; // half card width
      const hh = 73;  // half card height

      cardWrap.style.left    = (curX - hw * curS) + 'px';
      cardWrap.style.top     = (curY - hh * curS) + 'px';
      cardWrap.style.transform = `scale(${curS})`;
      cardWrap.style.opacity   = curOp;
      cardWrap.style.transformOrigin = '0 0';

      // Ring tracks same point, slightly bigger
      const rw = 170;
      ringWrap.style.left      = (curX - rw * curS) + 'px';
      ringWrap.style.top       = (curY - rw * curS) + 'px';
      ringWrap.style.transform = `scale(${curS})`;
      ringWrap.style.opacity   = curOp * 0.6;
      ringWrap.style.transformOrigin = '0 0';

      requestAnimationFrame(animate);
    }
    animate();

    // ── Start gyro ──
    function startGyro(){
      if(typeof DeviceOrientationEvent !== 'undefined' &&
         typeof DeviceOrientationEvent.requestPermission === 'function'){
        DeviceOrientationEvent.requestPermission()
          .then(s => { if(s==='granted') window.addEventListener('deviceorientation', handleOrientation, true); })
          .catch(console.error);
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h   = document.createElement('div');
      h.className = 'heart';
      const sz  = 5 + Math.random() * 12;
      h.style.cssText = `
        left:${8+Math.random()*84}%;
        bottom:${10+Math.random()*40}%;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*2}s;
        box-shadow:0 0 6px currentColor;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 320);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startGyro();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
