<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
    #card-wrap { position:fixed; z-index:2; pointer-events:none; will-change:transform; }
    #card-img {
      width:260px; display:block; border-radius:6px;
      box-shadow: 0 0 50px rgba(255,20,147,0.9), 0 20px 60px rgba(0,0,0,0.5);
      animation: float 3.5s ease-in-out infinite;
    }
    #ring-wrap { position:fixed; z-index:1; pointer-events:none; will-change:transform; }
    #hearts-layer { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
    .heart { position:absolute; border-radius:50%; animation:rise linear infinite; }
    #msg {
      position:fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:4; pointer-events:none; font-family:Georgia,serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow:0 0 20px #ff1493,0 0 6px #fff; animation:pulse 1.6s ease-in-out infinite; }
    #msg p  { color:#ffb6c1; font-size:4.5vw; text-shadow:0 0 10px #ff1493; margin-top:4px; }
    #hud {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.8); color:#0f0; font-family:monospace; font-size:11px;
      padding:6px 14px; border-radius:20px; border:1px solid #0f0;
      z-index:9999; white-space:nowrap; max-width:95vw; text-align:center;
    }
    #banner {
      position:fixed; bottom:20px; left:10px; right:10px;
      background:rgba(60,0,30,0.88); color:#ffb6c1;
      font-family:Georgia,serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px; border:1px solid #ff69b4;
      text-align:center; z-index:9999; display:none;
    }
    #splash {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#0a0015 0%,#000005 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition:opacity 1s ease; font-family:Georgia,serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation:hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.8; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.85}
                      100%{transform:translateY(-110vh) scale(0.1);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>
  <div id="card-wrap"><img id="card-img" src="./card.png"/></div>
  <div id="ring-wrap">
    <svg viewBox="0 0 200 200" fill="none" style="width:340px;animation:spin 9s linear infinite;opacity:0.55;">
      <circle cx="100" cy="100" r="90" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="14 7"/>
      <circle cx="100" cy="100" r="70" stroke="#ff1493" stroke-width="1" stroke-dasharray="7 12"/>
    </svg>
  </div>
  <div id="hearts-layer"></div>
  <div id="msg"><h2>I Love You Mum</h2><p>Happy Mother's Day 🌸</p></div>
  <div id="hud">⭐ Locking star position…</div>
  <div id="banner">🌸 Happy Mother's Day! Rotate your phone — find the card in space 💐</div>
  <div id="splash">
    <div class="s-icon">🌸</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access.<br>The card is a star pinned in space —<br>rotate your phone to find it!</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const ringWrap = document.getElementById('ring-wrap');
    const heartsEl = document.getElementById('hearts-layer');
    const hud      = document.getElementById('hud');

    // ════════════════════════════════════════════════
    //  QUATERNION MATHS
    //  No gimbal lock. Card is a unit vector in world
    //  space. Phone orientation is a quaternion.
    //  We rotate the card vector into camera space,
    //  then project it onto screen.
    // ════════════════════════════════════════════════

    // Quaternion multiply: q1 * q2
    function qMul(q1, q2){
      const [w1,x1,y1,z1] = q1, [w2,x2,y2,z2] = q2;
      return [
        w1*w2 - x1*x2 - y1*y2 - z1*z2,
        w1*x2 + x1*w2 + y1*z2 - z1*y2,
        w1*y2 - x1*z2 + y1*w2 + z1*x2,
        w1*z2 + x1*y2 - y1*x2 + z1*w2
      ];
    }

    // Conjugate (inverse for unit quaternion)
    function qConj([w,x,y,z]){ return [w,-x,-y,-z]; }

    // Rotate vector v by quaternion q: q * [0,v] * q^-1
    function qRotVec(q, v){
      const qv  = [0, v[0], v[1], v[2]];
      const res = qMul(qMul(q, qv), qConj(q));
      return [res[1], res[2], res[3]];
    }

    // Build quaternion from DeviceOrientation Euler angles (W3C spec)
    // Order: Rz(alpha) * Rx(beta) * Ry(gamma)
    function eulerToQuat(alphaDeg, betaDeg, gammaDeg){
      const a = alphaDeg * Math.PI / 180 / 2;
      const b = betaDeg  * Math.PI / 180 / 2;
      const g = gammaDeg * Math.PI / 180 / 2;

      // Rz(alpha)
      const qA = [Math.cos(a), 0, 0, Math.sin(a)];
      // Rx(beta)
      const qB = [Math.cos(b), Math.sin(b), 0, 0];
      // Ry(gamma)
      const qG = [Math.cos(g), 0, Math.sin(g), 0];

      return qMul(qMul(qA, qB), qG);
    }

    // ── State ──
    let starVec  = null;   // Fixed world-space unit vector of card (the "star")
    let locked   = false;
    let readings = 0;

    // Smoothed screen coords
    let sX = window.innerWidth/2, sY = window.innerHeight/2;
    let sS = 1, sOp = 1;

    // Virtual field of view — controls how fast card moves off screen
    // 60° FOV → FOCAL = W / (2 * tan(30°)) ≈ W * 0.866
    const FOCAL = () => window.innerWidth * 1.2;

    function onOrientation(e){
      if(e.alpha === null || e.beta === null || e.gamma === null) return;
      readings++;

      // Build phone orientation quaternion
      const Q = eulerToQuat(e.alpha, e.beta, e.gamma);

      // On first reading: lock card straight ahead
      // Straight ahead in device space = (0, 0, -1) (into screen)
      // Transform to world space: starVec = Q * (0,0,-1)
      if(!locked && readings === 1){
        starVec = qRotVec(Q, [0, 0, -1]);
        locked  = true;
        hud.textContent = '⭐ Star locked! Rotate phone to explore';
        return;
      }
      if(!locked) return;

      // Transform star world position into current camera space
      // cameraPos = Q^-1 * starVec  (inverse rotation)
      const camPos = qRotVec(qConj(Q), starVec);

      // camPos is a direction vector in camera space:
      // X: right (+) / left (-)
      // Y: up (+) / down (-)
      // Z: forward (-) / behind (+)
      const cx = camPos[0];
      const cy = camPos[1];
      const cz = camPos[2];

      const W = window.innerWidth;
      const H = window.innerHeight;
      const F = FOCAL();

      if(cz < -0.01){
        // Card is in front — project onto screen
        const depth = -cz;
        const px = W/2 + (cx / depth) * F;
        const py = H/2 - (cy / depth) * F;

        // Scale by depth — further from centre = smaller (perspective)
        const tgtS  = Math.min(1.5, Math.max(0.05, depth * 1.2));
        const tgtOp = Math.min(1,   Math.max(0,    depth * 2.0));

        sX  += (px    - sX)  * 0.2;
        sY  += (py    - sY)  * 0.2;
        sS  += (tgtS  - sS)  * 0.2;
        sOp += (tgtOp - sOp) * 0.2;

        // Off-centre angle for HUD
        const offDeg = Math.round(Math.acos(Math.min(1, depth)) * 180 / Math.PI);
        hud.textContent = offDeg < 10
          ? `⭐ Dead ahead!`
          : `🔭 ${offDeg}° off centre`;

      } else {
        // Behind us
        sOp += (0 - sOp) * 0.2;
        hud.textContent = `🔄 Turn around — card is behind you`;
      }

      // Apply to DOM
      const hw = 130, hh = 73;
      cardWrap.style.left            = (sX - hw * sS) + 'px';
      cardWrap.style.top             = (sY - hh * sS) + 'px';
      cardWrap.style.transform       = `scale(${sS})`;
      cardWrap.style.opacity         = sOp;
      cardWrap.style.transformOrigin = '0 0';

      const rw = 170;
      ringWrap.style.left            = (sX - rw * sS) + 'px';
      ringWrap.style.top             = (sY - rw * sS) + 'px';
      ringWrap.style.transform       = `scale(${sS})`;
      ringWrap.style.opacity         = sOp * 0.55;
      ringWrap.style.transformOrigin = '0 0';
    }

    // ── Start sensors ──
    function startGyro(){
      let absAttached = false;

      window.addEventListener('deviceorientationabsolute', e => {
        if(!absAttached){ absAttached = true; hud.textContent = '📡 Absolute sensor ✅'; }
        onOrientation(e);
      }, true);

      setTimeout(() => {
        if(readings === 0){
          hud.textContent = '📡 Relative sensor…';
          window.addEventListener('deviceorientation', onOrientation, true);
        }
      }, 800);
    }

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const sz = 5 + Math.random() * 12;
      h.style.cssText = `
        left:${8+Math.random()*84}%;
        bottom:${10+Math.random()*40}%;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*2}s;
        box-shadow:0 0 6px currentColor;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 320);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' } }, audio:false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startGyro();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>
</body>
</html>
