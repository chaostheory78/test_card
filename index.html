<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family: Georgia, serif; }

    #splash {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; text-align: center;
      padding: 30px; gap: 18px; transition: opacity 1s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .icon { font-size: 4em; animation: hb 1.4s ease-in-out infinite; }
    h1 { color: #ff69b4; font-size: 1.5em; font-weight: normal; }
    .sub { color: #ffb6c1; font-size: 0.9em; line-height: 1.7; max-width: 280px; }
    .ring { width: 64px; height: 64px; border: 3px solid transparent;
      border-top-color: #ff69b4; border-right-color: #ff1493;
      border-radius: 50%; animation: spin 1.1s linear infinite; }
    #status-msg { color: #884466; font-size: 0.8em; border: 1px solid #441122;
      padding: 8px 18px; border-radius: 16px; }
    #banner {
      position: fixed; bottom: 20px; left: 10px; right: 10px;
      background: rgba(60,0,30,0.9); color: #ffb6c1; font-size: 0.95em;
      padding: 12px 20px; border-radius: 20px; border: 1px solid #ff69b4;
      text-align: center; z-index: 1000; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes hb   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  </style>
</head>
<body>

  <div id="splash">
    <div class="icon">💐</div>
    <h1>Mother's Day Surprise</h1>
    <div class="ring"></div>
    <p class="sub">Allow camera & GPS when asked<br>then step outside</p>
    <div id="status-msg">📡 Getting your location…</div>
  </div>

  <div id="banner">🌸 Happy Mother's Day! 💐</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="alpha: true"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

    <a-camera>

      <!-- Everything is 1 metre in front of the camera -->

      <!-- Card image -->
      <a-image src="./card.png"
        position="0 0 -1"
        width="0.8" height="0.45"
        animation="property: position; from: 0 0 -1; to: 0 0.02 -1; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
      </a-image>

      <!-- Big red heart above card -->
      <a-sphere position="0 0.35 -1" radius="0.06" color="#ff0055"
        animation__float="property: position; from: 0 0.35 -1; to: 0 0.55 -1; dur: 2800; loop: true; dir: alternate; easing: easeInOutSine"
        animation__pulse="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 1400; loop: true; dir: alternate">
      </a-sphere>

      <!-- Left heart -->
      <a-sphere position="-0.25 0.25 -1" radius="0.04" color="#ff69b4"
        animation="property: position; from: -0.25 0.25 -1; to: -0.25 0.45 -1; dur: 2400; loop: true; dir: alternate; easing: easeInOutSine; delay: 300">
      </a-sphere>

      <!-- Right heart -->
      <a-sphere position="0.25 0.22 -1" radius="0.04" color="#ff0044"
        animation="property: position; from: 0.25 0.22 -1; to: 0.25 0.42 -1; dur: 2600; loop: true; dir: alternate; easing: easeInOutSine; delay: 500">
      </a-sphere>

      <!-- Gold sparkle left -->
      <a-sphere position="-0.12 0.42 -1" radius="0.02" color="#FFD700"
        animation__scale="property: scale; from: 0.5 0.5 0.5; to: 3 3 3; dur: 850; loop: true; dir: alternate"
        animation__float="property: position; from: -0.12 0.42 -1; to: -0.16 0.56 -1; dur: 1400; loop: true; dir: alternate">
      </a-sphere>

      <!-- Gold sparkle right -->
      <a-sphere position="0.12 0.40 -1" radius="0.02" color="#FFD700"
        animation__scale="property: scale; from: 0.5 0.5 0.5; to: 3 3 3; dur: 700; loop: true; dir: alternate; delay: 250"
        animation__float="property: position; from: 0.12 0.40 -1; to: 0.16 0.54 -1; dur: 1600; loop: true; dir: alternate; delay: 250">
      </a-sphere>

      <!-- Spinning ring -->
      <a-torus position="0 0 -1" radius="0.55" tube="0.01" color="#ff69b4"
        animation="property: rotation; from: 0 0 0; to: 0 0 360; dur: 9000; loop: true; easing: linear">
      </a-torus>

      <!-- Message -->
      <a-text value="I Love You Mum" align="center" color="#ffffff"
        position="0 -0.35 -1" width="1.8"
        animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 1600; loop: true; dir: alternate; easing: easeInOutSine">
      </a-text>

      <a-text value="Happy Mother's Day" align="center" color="#ffb6c1"
        position="0 -0.46 -1" width="1.4">
      </a-text>

    </a-camera>

  </a-scene>

  <script>
    const splash    = document.getElementById('splash');
    const statusMsg = document.getElementById('status-msg');
    const banner    = document.getElementById('banner');

    // Geofence — triggers when within 20m of mum's house
    const FENCE_LAT = 50.80381187841226;
    const FENCE_LNG = -1.0635148029530945;
    const FENCE_M   = 20;

    function toRad(v){ return v * Math.PI / 180; }
    function dist(la1,lo1,la2,lo2){
      const R=6371000, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
      const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    navigator.geolocation.watchPosition(pos => {
      const d = Math.round(dist(pos.coords.latitude, pos.coords.longitude, FENCE_LAT, FENCE_LNG));
      statusMsg.textContent = `📍 ${d}m from the surprise`;

      // Always show AR — just hide splash once GPS locks
      splash.classList.add('hide');
      setTimeout(() => splash.style.display = 'none', 1000);
      banner.style.display = 'block';
      banner.innerHTML = d <= FENCE_M
        ? '🌸 Happy Mother\'s Day! Look around 💐'
        : `📍 ${d}m away — keep walking 🌸`;

    }, err => {
      statusMsg.textContent = '❌ Please enable GPS';
    }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });
  </script>

</body>
</html>
