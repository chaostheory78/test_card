<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { margin:0; padding:0; }
    body { overflow:hidden; background:#000; }
  </style>
</head>
<body>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

    <!-- Card is attached to the camera so it always stays in view -->
    <a-camera>

      <!-- Card floats 3 metres in front of you -->
      <a-image
        src="./card.png"
        position="0 0 -3"
        width="2.4" height="1.35"
        animation="property: position; from: 0 0 -3; to: 0 0.05 -3; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
      </a-image>

      <!-- Spinning pink ring around the card -->
      <a-torus
        position="0 0 -3"
        radius="1.3" tube="0.025" color="#ff69b4"
        animation="property: rotation; from: 0 0 0; to: 0 0 360; dur: 9000; loop: true; easing: linear">
      </a-torus>

      <!-- Big heart rises above card -->
      <a-sphere
        position="0 1.1 -3" radius="0.12" color="#ff0055"
        animation__float="property: position; from: 0 1.1 -3; to: 0 1.5 -3; dur: 2800; loop: true; dir: alternate; easing: easeInOutSine"
        animation__pulse="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 1400; loop: true; dir: alternate">
      </a-sphere>

      <!-- Left heart -->
      <a-sphere
        position="-0.7 0.9 -3" radius="0.07" color="#ff69b4"
        animation="property: position; from: -0.7 0.9 -3; to: -0.7 1.3 -3; dur: 2400; loop: true; dir: alternate; easing: easeInOutSine; delay: 300">
      </a-sphere>

      <!-- Right heart -->
      <a-sphere
        position="0.7 0.85 -3" radius="0.07" color="#ff0044"
        animation="property: position; from: 0.7 0.85 -3; to: 0.7 1.25 -3; dur: 2600; loop: true; dir: alternate; easing: easeInOutSine; delay: 500">
      </a-sphere>

      <!-- Gold sparkle left -->
      <a-sphere
        position="-0.3 1.3 -3" radius="0.04" color="#FFD700"
        animation__scale="property: scale; from: 0.5 0.5 0.5; to: 2.5 2.5 2.5; dur: 850; loop: true; dir: alternate"
        animation__float="property: position; from: -0.3 1.3 -3; to: -0.4 1.55 -3; dur: 1400; loop: true; dir: alternate">
      </a-sphere>

      <!-- Gold sparkle right -->
      <a-sphere
        position="0.3 1.25 -3" radius="0.04" color="#FFD700"
        animation__scale="property: scale; from: 0.5 0.5 0.5; to: 2.5 2.5 2.5; dur: 700; loop: true; dir: alternate; delay: 250"
        animation__float="property: position; from: 0.3 1.25 -3; to: 0.4 1.5 -3; dur: 1600; loop: true; dir: alternate; delay: 250">
      </a-sphere>

      <!-- Message -->
      <a-text
        value="I Love You Mum"
        align="center" color="#ffffff"
        position="0 -0.9 -3" width="4"
        animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 1600; loop: true; dir: alternate; easing: easeInOutSine">
      </a-text>

      <a-text
        value="Happy Mother's Day"
        align="center" color="#ffb6c1"
        position="0 -1.1 -3" width="3">
      </a-text>

    </a-camera>

  </a-scene>

</body>
</html>
