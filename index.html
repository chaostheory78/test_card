<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; z-index:0;
    }

    #card-wrap {
      position:fixed; z-index:2; pointer-events:none;
      will-change:transform,left,top,opacity;
    }
    #card-img {
      width:260px; display:block; border-radius:6px;
      box-shadow: 0 0 50px rgba(255,20,147,0.8), 0 20px 60px rgba(0,0,0,0.5);
      animation: float 3.5s ease-in-out infinite;
    }

    #ring-wrap {
      position:fixed; z-index:1; pointer-events:none;
      will-change:transform,left,top;
    }

    #hearts-layer { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
    .heart { position:absolute; border-radius:50%; animation:rise linear infinite; }

    #msg {
      position:fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:4; pointer-events:none;
      font-family:Georgia,serif;
    }
    #msg h2 { color:#fff; font-size:7vw; font-weight:bold;
      text-shadow:0 0 20px #ff1493,0 0 6px #fff; animation:pulse 1.6s ease-in-out infinite; }
    #msg p  { color:#ffb6c1; font-size:4.5vw; text-shadow:0 0 10px #ff1493; margin-top:4px; }

    #hud {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(60,0,30,0.88); color:#0f0;
      font-family:monospace; font-size:11px;
      padding:6px 14px; border-radius:20px; border:1px solid #441122;
      z-index:9999; white-space:nowrap; max-width:95vw;
    }

    #banner {
      position:fixed; bottom:20px; left:10px; right:10px;
      background:rgba(60,0,30,0.88); color:#ffb6c1;
      font-family:Georgia,serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px; border:1px solid #ff69b4;
      text-align:center; z-index:9999; display:none;
    }

    #splash {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at center,#2d0030 0%,#0d000a 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:16px; transition:opacity 1s ease;
      font-family:Georgia,serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon  { font-size:4em; animation:hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.8; max-width:280px; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.85}
                      100%{transform:translateY(-110vh) scale(0.1);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <div id="card-wrap">
    <img id="card-img" src="./card.png"/>
  </div>

  <div id="ring-wrap">
    <svg viewBox="0 0 200 200" fill="none" style="width:340px; animation:spin 9s linear infinite; opacity:0.55;">
      <circle cx="100" cy="100" r="90" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="14 7"/>
      <circle cx="100" cy="100" r="70" stroke="#ff1493" stroke-width="1" stroke-dasharray="7 12"/>
    </svg>
  </div>

  <div id="hearts-layer"></div>

  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="hud">🧭 Waiting for sensors…</div>
  <div id="banner">🌸 Happy Mother's Day! Move your phone to find the card 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera & motion access<br>The card is pinned in space —<br>rotate your phone to find it!</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const ringWrap = document.getElementById('ring-wrap');
    const heartsEl = document.getElementById('hearts-layer');
    const hud      = document.getElementById('hud');

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    const toRad = d => d * Math.PI / 180;

    // ── Sensor state ──
    let initAlpha = null, initBeta = null, initGamma = null;
    let curAlpha  = 0,    curBeta  = 0,    curGamma  = 0;
    let locked = false;
    let sensorCount = 0;

    // Smoothed screen position
    let sX = W()/2, sY = H()/2, sS = 1, sOp = 1;

    // Shortest angle delta — handles 0/360 wrap
    function angleDiff(a, b){ return ((a - b + 540) % 360) - 180; }

    function onOrientation(e){
      if(e.alpha === null) return;
      sensorCount++;

      // Smooth the raw sensor values
      const smoothing = 0.25;
      curAlpha  += angleDiff(e.alpha,  curAlpha)  * smoothing;
      curBeta   += (e.beta  - curBeta)  * smoothing;
      curGamma  += (e.gamma - curGamma) * smoothing;
      curAlpha   = ((curAlpha % 360) + 360) % 360;

      // Lock card position on first stable reading
      if(!locked && sensorCount > 1){
        initAlpha = curAlpha;
        initBeta  = curBeta;
        initGamma = curGamma;
        locked = true;
        hud.textContent = '✅ Card locked! Rotate phone to explore';
        return;
      }
      if(!locked) return;

      // Delta from locked position
      const dAlpha = angleDiff(curAlpha, initAlpha); // yaw   — turning left/right
      const dBeta  = curBeta  - initBeta;            // pitch — tilting up/down
      const dGamma = curGamma - initGamma;           // roll  — rolling left/right

      // Project onto screen
      // dAlpha: full 360° maps across multiple screen widths
      // dBeta:  full 180° maps across screen height
      const SENS_X = W() / 30;   // pixels per degree horizontal
      const SENS_Y = H() / 30;   // pixels per degree vertical

      const tgtX = W()/2 + dAlpha * SENS_X;
      const tgtY = H()/2 + dBeta  * SENS_Y;

      // Scale: centred = 1.0, further away = shrinks
      const dist  = Math.sqrt(dAlpha*dAlpha + dBeta*dBeta);
      const tgtS  = Math.max(0.08, Math.min(1.4, 1.4 - dist * 0.012));
      const tgtOp = Math.max(0,    Math.min(1,   1.2 - dist * 0.015));

      // Lerp
      sX  += (tgtX  - sX)  * 0.3;
      sY  += (tgtY  - sY)  * 0.3;
      sS  += (tgtS  - sS)  * 0.3;
      sOp += (tgtOp - sOp) * 0.3;

      // Position card — centred on sX, sY
      const cw = 130 * sS, ch = 73 * sS;
      cardWrap.style.left      = (sX - cw) + 'px';
      cardWrap.style.top       = (sY - ch) + 'px';
      cardWrap.style.transform = `scale(${sS})`;
      cardWrap.style.opacity   = sOp;
      cardWrap.style.transformOrigin = '0 0';

      const rw = 170 * sS;
      ringWrap.style.left      = (sX - rw) + 'px';
      ringWrap.style.top       = (sY - rw) + 'px';
      ringWrap.style.transform = `scale(${sS})`;
      ringWrap.style.opacity   = sOp * 0.55;
      ringWrap.style.transformOrigin = '0 0';

      // HUD
      const offDeg = Math.round(dist);
      hud.textContent = offDeg < 12
        ? `✅ Dead ahead! α:${Math.round(curAlpha)}°`
        : `🧭 ${offDeg}° off | α:${Math.round(curAlpha)}° β:${Math.round(curBeta)}° γ:${Math.round(curGamma)}°`;
    }

    // ── Start sensors — try absolute first (Android), fallback to relative ──
    function startGyro(){
      let attached = false;

      // deviceorientationabsolute = compass-corrected on Android Chrome
      window.addEventListener('deviceorientationabsolute', e => {
        if(!attached){ attached = true; hud.textContent = '📡 Absolute orientation ✅'; }
        onOrientation(e);
      }, true);

      // Fallback after 1s if absolute not firing
      setTimeout(() => {
        if(sensorCount === 0){
          hud.textContent = '📡 Using relative orientation…';
          window.addEventListener('deviceorientation', onOrientation, true);
        }
      }, 1000);
    }

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const sz = 5 + Math.random() * 12;
      h.style.cssText = `
        left:${8+Math.random()*84}%;
        bottom:${10+Math.random()*40}%;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3+Math.random()*4}s;
        animation-delay:${Math.random()*2}s;
        box-shadow:0 0 6px currentColor;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 320);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' } }, audio:false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
        startGyro();
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
