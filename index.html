<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family: Georgia, serif; }

    #splash {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; text-align: center;
      padding: 30px; gap: 18px; transition: opacity 1s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    .icon { font-size: 4em; animation: hb 1.4s ease-in-out infinite; }
    h1 { color: #ff69b4; font-size: 1.5em; font-weight: normal; }
    .sub { color: #ffb6c1; font-size: 0.9em; line-height: 1.7; max-width: 280px; }
    .ring {
      width: 64px; height: 64px;
      border: 3px solid transparent;
      border-top-color: #ff69b4; border-right-color: #ff1493;
      border-radius: 50%; animation: spin 1.1s linear infinite;
    }
    #status-msg { color: #884466; font-size: 0.8em; border: 1px solid #441122;
      padding: 8px 18px; border-radius: 16px; }

    #banner {
      position: fixed; bottom: 20px; left: 10px; right: 10px;
      background: rgba(60,0,30,0.9); color: #ffb6c1; font-size: 0.95em;
      padding: 12px 20px; border-radius: 20px; border: 1px solid #ff69b4;
      text-align: center; z-index: 1000; display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes hb   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  </style>
</head>
<body>

  <div id="splash">
    <div class="icon">💐</div>
    <h1>Mother's Day Surprise</h1>
    <div class="ring"></div>
    <p class="sub">Allow camera & GPS when asked<br>then step outside</p>
    <div id="status-msg">📡 Getting your location…</div>
  </div>

  <div id="banner"></div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

    <a-camera gps-camera rotation-reader></a-camera>

    <!-- These coords get replaced by JS once we have GPS + compass -->
    <a-sphere id="ball1" gps-entity-place="latitude: 0; longitude: 0;"
      color="#ff0055" radius="2" position="0 1 0"></a-sphere>

    <a-sphere id="ball2" gps-entity-place="latitude: 0; longitude: 0;"
      color="#ff69b4" radius="1.2" position="0 3 0"
      animation="property: position; from: 0 3 0; to: 0 5 0; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <a-sphere id="ball3" gps-entity-place="latitude: 0; longitude: 0;"
      color="#FFD700" radius="0.8" position="0 5 0"
      animation="property: scale; from: 1 1 1; to: 2 2 2; dur: 900; loop: true; dir: alternate;">
    </a-sphere>

    <a-text id="msg" gps-entity-place="latitude: 0; longitude: 0;"
      value="I Love You Mum" align="center" color="#ffffff"
      width="40" position="0 1 0">
    </a-text>

  </a-scene>

  <script>
    const splash    = document.getElementById('splash');
    const statusMsg = document.getElementById('status-msg');
    const banner    = document.getElementById('banner');

    let myLat = null, myLng = null, heading = null;
    let placed = false;

    const DISTANCE = 5; // metres in front of user

    function toRad(v){ return v * Math.PI / 180; }

    // Calculate a point N metres ahead in a given compass bearing
    function pointAhead(lat, lng, bearing, metres){
      const R   = 6371000;
      const d   = metres / R;
      const brg = toRad(bearing);
      const la1 = toRad(lat);
      const lo1 = toRad(lng);
      const la2 = Math.asin(Math.sin(la1)*Math.cos(d) + Math.cos(la1)*Math.sin(d)*Math.cos(brg));
      const lo2 = lo1 + Math.atan2(Math.sin(brg)*Math.sin(d)*Math.cos(la1), Math.cos(d)-Math.sin(la1)*Math.sin(la2));
      return { lat: la2 * 180/Math.PI, lng: lo2 * 180/Math.PI };
    }

    function placeObjects(){
      if(placed || myLat === null || heading === null) return;
      placed = true;

      const pt = pointAhead(myLat, myLng, heading, DISTANCE);

      // Update all entities
      ['ball1','ball2','ball3','msg'].forEach(id => {
        const el = document.getElementById(id);
        el.setAttribute('gps-entity-place', `latitude: ${pt.lat}; longitude: ${pt.lng};`);
      });

      statusMsg.textContent = `✅ Placed ${DISTANCE}m ahead!`;
      banner.style.display = 'block';
      banner.innerHTML = '🌸 Look ahead — your surprise is here! 💐';

      // Hide splash
      setTimeout(() => {
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
      }, 800);
    }

    // GPS
    navigator.geolocation.watchPosition(pos => {
      myLat = pos.coords.latitude;
      myLng = pos.coords.longitude;
      statusMsg.textContent = `📍 Got location — now getting compass…`;
      placeObjects();
    }, err => {
      statusMsg.textContent = `❌ GPS error: ${err.message}`;
    }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });

    // Compass
    function handleOrientation(e){
      if(e.alpha !== null){
        heading = (360 - e.alpha) % 360;
        if(myLat !== null) statusMsg.textContent = `🧭 Heading: ${Math.round(heading)}°`;
        placeObjects();
      }
    }

    if(typeof DeviceOrientationEvent !== 'undefined' &&
       typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().then(s => {
        if(s === 'granted') window.addEventListener('deviceorientation', handleOrientation);
      });
    } else {
      window.addEventListener('deviceorientation', handleOrientation);
    }
  </script>

</body>
</html>
