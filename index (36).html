<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family: monospace; }
    #debug {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-size: 12px; padding: 10px; z-index: 9999;
      line-height: 1.8;
    }
    #banner {
      position: fixed; bottom: 20px; left: 10px; right: 10px;
      background: rgba(60,0,30,0.9); color: #ffb6c1;
      font-family: Georgia, serif; font-size: 1em;
      padding: 12px 20px; border-radius: 20px;
      border: 1px solid #ff69b4; text-align: center;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="debug">
    📡 GPS: waiting...<br>
    📍 My pos: —<br>
    🎯 Target: 50.7894528, -1.0840936<br>
    📏 Distance: —<br>
    🎥 A-Frame: waiting...
  </div>

  <div id="banner">Loading…</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Card is at target coords, faces north (towards viewer who looks south) -->

    <!-- Big red ball — easy to spot -->
    <a-sphere
      gps-entity-place="latitude: 50.7894528; longitude: -1.0840936;"
      color="#ff0055"
      radius="3"
      position="0 3 0">
    </a-sphere>

    <!-- Floating pink ball -->
    <a-sphere
      gps-entity-place="latitude: 50.7894528; longitude: -1.0840936;"
      color="#ff69b4"
      radius="1.5"
      position="0 8 0"
      animation="property: position; from: 0 8 0; to: 0 12 0; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <!-- Gold sparkle -->
    <a-sphere
      gps-entity-place="latitude: 50.7894528; longitude: -1.0840936;"
      color="#FFD700"
      radius="1"
      position="0 14 0"
      animation="property: scale; from: 1 1 1; to: 2 2 2; dur: 1000; loop: true; dir: alternate;">
    </a-sphere>

    <!-- Text -->
    <a-text
      gps-entity-place="latitude: 50.7894528; longitude: -1.0840936;"
      value="I Love You Mum"
      align="center"
      color="#ffffff"
      width="60"
      position="0 6 0">
    </a-text>

  </a-scene>

  <script>
    const debug  = document.getElementById('debug');
    const banner = document.getElementById('banner');

    // Viewpoint coords
    const VIEW_LAT = 50.7895313;
    const VIEW_LNG = -1.0840788;

    // Target coords (where card appears)
    const LAT = 50.7894528;
    const LNG = -1.0840936;

    const FENCE = 10; // metres geofence around viewpoint

    function toRad(v){ return v * Math.PI / 180; }
    function dist(la1,lo1,la2,lo2){
      const R=6371000, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
      const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      debug.innerHTML = debug.innerHTML.replace('🎥 A-Frame: waiting...','🎥 A-Frame: ✅ loaded');
    });

    navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude, accuracy } = pos.coords;
      const dTarget  = Math.round(dist(latitude, longitude, LAT, LNG));
      const dView    = Math.round(dist(latitude, longitude, VIEW_LAT, VIEW_LNG));

      debug.innerHTML =
        `📡 GPS: ✅ accuracy ±${Math.round(accuracy)}m<br>` +
        `📍 Me: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>` +
        `🎯 Target: ${LAT}, ${LNG}<br>` +
        `📏 To card: ${dTarget}m | To viewpoint: ${dView}m<br>` +
        `🎥 A-Frame: ✅ loaded`;

      if(dView <= FENCE){
        banner.innerHTML = '🌸 Look south — your surprise is here!';
        banner.style.borderColor = '#ff69b4';
      } else {
        banner.innerHTML = `📍 ${dView}m from viewpoint — get closer`;
        banner.style.borderColor = '#441122';
      }

    }, err => {
      debug.innerHTML += `<br>❌ GPS error: ${err.message}`;
      banner.textContent = '❌ GPS failed — check permissions';
    }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
  </script>

</body>
</html>
