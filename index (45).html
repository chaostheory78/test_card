<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Mother's Day 💐</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #cam {
      position: fixed; inset:0;
      width:100%; height:100%;
      object-fit: cover; z-index:0;
    }

    #ar-layer {
      position: fixed; inset:0;
      z-index:1; pointer-events:none;
      perspective: 600px;
      display: flex; align-items: center; justify-content: center;
    }

    #card-wrap {
      transform-style: preserve-3d;
      will-change: transform;
    }

    #card-img {
      width: 78vw;
      max-width: 420px;
      display: block;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(255,20,147,0.7), 0 20px 60px rgba(0,0,0,0.5);
      animation: float 3s ease-in-out infinite;
    }

    #hearts-layer {
      position: fixed; inset:0;
      z-index:2; pointer-events:none;
      overflow:hidden;
    }

    .heart {
      position: absolute;
      border-radius: 50%;
      animation: rise linear infinite;
      opacity: 0.85;
    }

    #ring {
      position: fixed; inset:0;
      z-index:2; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
    }
    #ring svg {
      width: 85vw; max-width:460px;
      animation: spin 10s linear infinite;
      opacity: 0.55;
      will-change: transform;
    }

    #msg {
      position: fixed; bottom:90px; left:0; right:0;
      text-align:center; z-index:3; pointer-events:none;
      font-family: Georgia, serif;
    }
    #msg h2 {
      color:#fff; font-size:7vw; font-weight:bold;
      text-shadow: 0 0 16px #ff1493, 0 0 4px #fff;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #msg p {
      color:#ffb6c1; font-size:4.5vw;
      text-shadow: 0 0 10px #ff1493; margin-top:4px;
    }

    #banner {
      position: fixed; bottom:20px; left:10px; right:10px;
      background: rgba(60,0,30,0.88); color:#ffb6c1;
      font-family: Georgia, serif; font-size:0.95em;
      padding:12px 20px; border-radius:20px;
      border:1px solid #ff69b4; text-align:center;
      z-index:9999; display:none;
    }

    #splash {
      position: fixed; inset:0;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000a 100%);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:9999; text-align:center;
      padding:30px; gap:18px; transition: opacity 1s ease;
      font-family: Georgia, serif;
    }
    #splash.hide { opacity:0; pointer-events:none; }
    .s-icon { font-size:4em; animation: hb 1.4s ease-in-out infinite; }
    .s-title { color:#ff69b4; font-size:1.5em; font-weight:normal; }
    .s-sub   { color:#ffb6c1; font-size:0.9em; line-height:1.7; }
    .s-ring  { width:60px; height:60px; border:3px solid transparent;
      border-top-color:#ff69b4; border-right-color:#ff1493;
      border-radius:50%; animation:spin 1.1s linear infinite; }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes hb    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes rise  { 0%{transform:translateY(0) scale(1);opacity:0.9} 100%{transform:translateY(-110vh) scale(0.2);opacity:0} }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>

  <div id="ar-layer">
    <div id="card-wrap">
      <img id="card-img" src="./card.png" alt="Mother's Day Card"/>
    </div>
  </div>

  <div id="ring">
    <svg viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="95" stroke="#ff69b4" stroke-width="1.5" stroke-dasharray="12 6"/>
      <circle cx="100" cy="100" r="75" stroke="#ff1493" stroke-width="1" stroke-dasharray="6 10"/>
    </svg>
  </div>

  <div id="hearts-layer"></div>

  <div id="msg">
    <h2>I Love You Mum</h2>
    <p>Happy Mother's Day 🌸</p>
  </div>

  <div id="banner">🌸 Move your phone to see the magic! 💐</div>

  <div id="splash">
    <div class="s-icon">💐</div>
    <h1 class="s-title">Mother's Day Surprise</h1>
    <div class="s-ring"></div>
    <p class="s-sub">Allow camera access when asked</p>
  </div>

  <script>
    const splash   = document.getElementById('splash');
    const banner   = document.getElementById('banner');
    const cam      = document.getElementById('cam');
    const cardWrap = document.getElementById('card-wrap');
    const heartsEl = document.getElementById('hearts-layer');

    // Current and target tilt
    let curX = 0, curY = 0;
    let tgtX = 0, tgtY = 0;

    // ── Method 1: Gyroscope ──
    let gyroActive = false;

    function handleOrientation(e){
      if(e.gamma === null) return;
      gyroActive = true;
      tgtY = Math.max(-20, Math.min(20, e.gamma * 0.4));
      tgtX = Math.max(-14, Math.min(14, ((e.beta || 45) - 45) * 0.25));
    }

    // Try requesting permission (iOS) then fallback
    if(typeof DeviceOrientationEvent !== 'undefined' &&
       typeof DeviceOrientationEvent.requestPermission === 'function'){
      document.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission().then(s => {
          if(s === 'granted') window.addEventListener('deviceorientation', handleOrientation);
        });
      }, { once: true });
    } else {
      window.addEventListener('deviceorientation', handleOrientation);
    }

    // ── Method 2: Touch / mouse drag as fallback ──
    let touching = false, tx0 = 0, ty0 = 0;

    document.addEventListener('touchstart', e => {
      touching = true;
      tx0 = e.touches[0].clientX;
      ty0 = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', e => {
      if(!touching || gyroActive) return;
      const dx = (e.touches[0].clientX - tx0) / window.innerWidth  * 40 - 20;
      const dy = (e.touches[0].clientY - ty0) / window.innerHeight * 30 - 15;
      tgtY =  Math.max(-20, Math.min(20, dx));
      tgtX = -Math.max(-14, Math.min(14, dy));
    });

    document.addEventListener('touchend', () => {
      touching = false;
      if(!gyroActive){ tgtX = 0; tgtY = 0; }
    });

    // ── Method 3: Device motion (accelerometer) ──
    window.addEventListener('devicemotion', e => {
      if(gyroActive) return;
      const acc = e.accelerationIncludingGravity;
      if(!acc) return;
      tgtY = Math.max(-20, Math.min(20, -(acc.x || 0) * 2));
      tgtX = Math.max(-14, Math.min(14,  (acc.y || 0) * 1.5 - 8));
    });

    // ── Smooth animation loop ──
    function animateTilt(){
      curX += (tgtX - curX) * 0.12;
      curY += (tgtY - curY) * 0.12;

      // 3D rotate + slight translate for parallax depth
      const tx = curY * 1.5;
      const ty = curX * 1.5;
      cardWrap.style.transform =
        `rotateX(${-curX}deg) rotateY(${curY}deg) translate(${tx}px, ${ty}px)`;

      requestAnimationFrame(animateTilt);
    }
    animateTilt();

    // ── Spawn hearts ──
    const colors = ['#ff0055','#ff69b4','#ff1493','#FFD700','#fffacd','#ff8fb1'];
    function spawnHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      const size = 5 + Math.random() * 13;
      h.style.cssText = `
        left:${8 + Math.random()*84}%;
        bottom:${15 + Math.random()*35}%;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${3 + Math.random()*4}s;
        animation-delay:${Math.random()*1.5}s;
      `;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 8000);
    }
    setInterval(spawnHeart, 300);

    // ── Start camera ──
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(stream => {
      cam.srcObject = stream;
      cam.onloadedmetadata = () => {
        cam.play();
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 1000);
        banner.style.display = 'block';
      };
    }).catch(() => {
      document.querySelector('.s-sub').textContent =
        '❌ Tap the lock icon, allow camera, then reload.';
      document.querySelector('.s-ring').style.display = 'none';
    });
  </script>

</body>
</html>
